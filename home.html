<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- daisyUI & tailwind  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- connect with font awesome for icon  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- title bar  -->
    <title>GitHub Issues Tracker</title>

    <!-- favicon  -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- connected with google fonts GEIST  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- css stylesheet connected  -->
    <link rel="stylesheet" href="./css style/style.css">
</head>

<body class="bg-gray-100">

    <!-- it is the navbar section  -->
    <nav class=" bg-sky-300 mb-16">
        <div class="navbar bg-base-100 shadow-sm justify-between">
            <div class="flex ">
                <img class="w-12" src="./assets/github-logo.png" alt="">
                <a class="text-xl align-middle ml-2 mt-2 font-semibold">GitHub Issues Tracker</a>
            </div>
            <div class="searchBar flex ">
                <div>
                    <label class="input">

                        <span><i class="fa-brands fa-searchengin"></i></span>
                        <input type="search" placeholder="Search issues.." required />

                    </label>
                </div>
                <button class="ml-3 btn btn-primary join-item">Search</button>
            </div>
        </div>
    </nav>
    <!-- it is the main body section  -->
    <main id="container" class="w-11/12 mx-auto">
        <!-- it is the button div  -->
        <div class="allBtn flex gap-4 p-6 bg-white rounded-md shadow-md mb-4">
            <!-- button ALL  -->
            <div id="btnAll" class="py-2 px-6 rounded-md shadow-sm btnColor">
                <button class=" ">All</button>
            </div>
            <!-- Button Open  -->
            <div id="btnOpen" class="py-2 px-6 rounded-md shadow-sm">
                <button class="">Open</button>
            </div>
            <!-- Button CLOSED  -->
            <div id="btnClosed" class="py-2 px-6 rounded-md shadow-sm">
                <button class="">Closed</button>
            </div>
        </div>

        <!-- it is total issues section  -->
        <div class="p-6 bg-white rounded-md shadow-md flex gap-3 mb-6">
            <!-- img icon div  -->
            <div class="">
                <img class="w-14 h-14" src="./assets/circle.png" alt="">
            </div>
            <!-- img text div  -->
            <div class="">
                <h2 id="totalIssues" class="text-xl font-semibold"></h2>
                <p class="text-base text-[#64748B]">Track and manage your project issues</p>
            </div>
        </div>

        <!-- display card section  -->
        <section id="displayCard" class="bg-white shadow-md grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 p-6">
            <!-- card that will be inserted dynamically  -->

        </section>



    </main>


    <!-- here is the modal functionality  -->
    <dialog id="wordModal" class="modal">
        <div class="modal-box">
            <div id="detailsModal" class="p-6 space-y-4">
                <!-- modal box text upload -->
            </div>
            <div class="modal-action ">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="py-3 px-4 rounded-md btnColor text-white">Close</button>
                </form>
            </div>
        </div>
    </dialog>



    <!-- connected with machine.js  -->
    <script src="./js scripts/machine.js"></script>
</body>

</html>
