<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- daisyUI & tailwind  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- title bar  -->
    <title>GitHub Issues Tracker</title>

    <!-- favicon  -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- connected with google fonts GEIST  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- css stylesheet connected  -->
     <link rel="stylesheet" href="./css style/style.css">
</head>

<body>
    <!-- full login body  -->
    <main class="max-h-screen max-w-md mt-16 mb-16 mx-auto boreder-black shadow-sm">
        <!-- it is complete login section  -->
        <section class="p-8">

            <!-- it is header part of login section  -->
            <div class="">
                <!-- login logo  -->
                <div class="logo-img mb-6">
                    <img class="text-center mx-auto" src="./assets/github-logo.png" alt="">
                </div>
                <!-- logo text  -->
                <h2 class="text-2xl font-semibold text-center mb-2">GitHub Issues Tracker</h2>
                <p class="text-base text-[#64748B] text-center">Sign in to manage your issues</p>
            </div>
            <!-- login input part  -->
            <div class="login-input">
                
            </div>
        </section>
    </main>

</body>

</html>
